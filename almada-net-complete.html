<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المدى نت — بوابة الإنترنت</title>
<meta name="description" content="بوابة كروت الإنترنت — المدى نت">
<meta name="theme-color" content="#070b14">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #00c6ff;
  --primary-dark: #0072ff;
  --accent: #ff6b35;
  --success: #00d68f;
  --warning: #ffaa00;
  --danger: #ff3d71;
  --bg: #070b14;
  --bg2: #0d1424;
  --bg3: #111827;
  --card: #131d2e;
  --card2: #1a2540;
  --border: rgba(0,198,255,0.12);
  --text: #e8edf5;
  --text2: #7a8ba8;
  --text3: #4a5a72;
  --font: 'Tajawal', sans-serif;
  --radius: 16px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.page { display: none; min-height: 100vh; }
.page.active { display: block; }

/* AUTH PAGE */
#authPage {
  display: none;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
#authPage.active { display: flex; }

.auth-bg {
  position: absolute; inset: 0;
  background: 
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,114,255,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 100%, rgba(0,198,255,0.08) 0%, transparent 50%);
}

.auth-box {
  position: relative;
  width: 420px;
  max-width: calc(100vw - 32px);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px;
  box-shadow: var(--shadow), 0 0 60px rgba(0,114,255,0.1);
  animation: fadeUp 0.5s ease;
  z-index: 10;
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}

.auth-logo {
  text-align: center;
  margin-bottom: 32px;
}

.auth-logo .logo-icon {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  border-radius: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin-bottom: 12px;
  box-shadow: 0 0 30px rgba(0,198,255,0.3);
}

.auth-logo h1 { font-size: 24px; font-weight: 700; color: var(--text); }
.auth-logo p  { font-size: 13px; color: var(--text2); margin-top: 4px; }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
.form-group input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 14px;
  color: var(--text);
  font-family: var(--font);
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus { border-color: var(--primary); }
.form-group input::placeholder { color: var(--text3); }

.btn-primary {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  margin-top: 4px;
  transition: opacity 0.2s, transform 0.1s;
  box-shadow: 0 4px 20px rgba(0,114,255,0.3);
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:active { transform: scale(0.98); }

/* USER APP */
#userPage { background: var(--bg); }

.user-header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}

.header-logo { display: flex; align-items: center; gap: 10px; }
.header-logo .icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.header-logo span { font-size: 16px; font-weight: 700; }

.header-actions { display: flex; align-items: center; gap: 12px; }
.balance-pill {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  display: flex; align-items: center; gap: 6px;
}
.logout-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  color: var(--text2);
  font-size: 12px;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.2s;
}
.logout-btn:hover { border-color: var(--danger); color: var(--danger); }

.user-content { padding: 20px; max-width: 600px; margin: 0 auto; }

.balance-card {
  background: linear-gradient(135deg, var(--primary-dark) 0%, #005bbf 50%, var(--primary) 100%);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 30px rgba(0,114,255,0.3);
}

.balance-label { font-size: 13px; opacity: 0.8; margin-bottom: 6px; }
.balance-amount { font-size: 38px; font-weight: 900; letter-spacing: -1px; }
.balance-amount span { font-size: 18px; font-weight: 400; margin-right: 4px; }

.section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--text); margin-top: 24px; }

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.card-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.card-item:hover {
  border-color: var(--primary);
  transform: translateY(-4px);
  box-shadow: 0 12px 24px rgba(0,198,255,0.2);
}

.card-price { font-size: 24px; font-weight: 900; color: var(--primary); margin: 8px 0; }
.card-name { font-size: 14px; color: var(--text2); }
.card-discount { font-size: 11px; color: var(--success); margin-top: 4px; }

.modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal.active { display: flex; }

.modal-content {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px;
  max-width: 400px;
  width: calc(100vw - 32px);
  text-align: center;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.modal-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
.modal-text { font-size: 14px; color: var(--text2); margin-bottom: 20px; }

.code-display {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin: 20px 0;
  font-family: monospace;
  font-size: 18px;
  color: var(--primary);
  word-break: break-all;
  position: relative;
}

.btn-copy {
  background: var(--primary-dark);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-family: var(--font);
  cursor: pointer;
  margin-top: 12px;
  transition: opacity 0.2s;
}
.btn-copy:hover { opacity: 0.9; }

.btn-close {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 8px;
  padding: 10px 20px;
  font-family: var(--font);
  cursor: pointer;
  margin-top: 12px;
  margin-right: 8px;
  transition: all 0.2s;
}
.btn-close:hover { border-color: var(--danger); color: var(--danger); }

.admin-section {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-top: 24px;
}

.admin-title { font-size: 16px; font-weight: 700; color: var(--warning); margin-bottom: 16px; }

.admin-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.admin-form input, .admin-form textarea {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.admin-form input:focus, .admin-form textarea:focus {
  border-color: var(--primary);
}

.btn-add {
  background: linear-gradient(135deg, var(--success), #00b878);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-family: var(--font);
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-add:hover { opacity: 0.9; }

.purchases-list {
  margin-top: 20px;
}

.purchase-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.purchase-info { flex: 1; }
.purchase-date { font-size: 12px; color: var(--text2); }
.purchase-code { font-size: 14px; color: var(--primary); font-weight: 600; }

.btn-copy-small {
  background: var(--primary-dark);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-copy-small:hover { opacity: 0.9; }

@media (max-width: 600px) {
  .cards-grid { grid-template-columns: repeat(2, 1fr); }
  .auth-box { width: 100%; padding: 24px; }
  .balance-amount { font-size: 28px; }
}
</style>
</head>
<body>

<!-- AUTH PAGE -->
<div id="authPage" class="page active">
  <div class="auth-bg"></div>
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-icon">📡</div>
      <h1>المدى نت</h1>
      <p>بوابة كروت الإنترنت</p>
    </div>
    
    <div class="form-group">
      <label>اسم المستخدم</label>
      <input type="text" id="loginUsername" placeholder="أدخل اسم المستخدم">
    </div>
    
    <div class="form-group">
      <label>كلمة المرور</label>
      <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور">
    </div>
    
    <button class="btn-primary" onclick="handleLogin()">تسجيل الدخول</button>
    
    <div style="text-align: center; margin-top: 16px; font-size: 13px; color: var(--text2);">
      ليس لديك حساب؟ <span style="color: var(--primary); cursor: pointer;" onclick="showSignup()">إنشاء حساب</span>
    </div>
  </div>
</div>

<!-- USER PAGE -->
<div id="userPage" class="page">
  <div class="user-header">
    <div class="header-logo">
      <div class="icon">📡</div>
      <span>المدى نت</span>
    </div>
    <div class="header-actions">
      <div class="balance-pill">
        <span>💰</span>
        <span id="headerBalance">0.00</span>
      </div>
      <button class="logout-btn" onclick="handleLogout()">تسجيل الخروج</button>
    </div>
  </div>
  
  <div class="user-content">
    <!-- Balance Card -->
    <div class="balance-card">
      <div class="balance-label">رصيدك الحالي</div>
      <div class="balance-amount"><span>ر.س</span><span id="balanceAmount">0.00</span></div>
    </div>
    
    <!-- Available Cards -->
    <div>
      <div class="section-title">الكروت المتاحة</div>
      <div class="cards-grid" id="cardsGrid">
        <!-- Cards will be generated here -->
      </div>
    </div>
    
    <!-- Purchases History -->
    <div>
      <div class="section-title">سجل المشتريات</div>
      <div class="purchases-list" id="purchasesList">
        <p style="color: var(--text2); text-align: center;">لا توجد مشتريات حتى الآن</p>
      </div>
    </div>
    
    <!-- Admin Section -->
    <div class="admin-section" id="adminSection" style="display: none;">
      <div class="admin-title">⚙️ لوحة التحكم الإدارية</div>
      
      <div style="margin-bottom: 16px;">
        <h3 style="font-size: 14px; margin-bottom: 8px;">إضافة فئة جديدة</h3>
        <div class="admin-form">
          <input type="text" id="categoryName" placeholder="اسم الفئة">
          <input type="number" id="categoryPrice" placeholder="السعر" step="0.01">
          <input type="number" id="categoryDiscount" placeholder="الخصم %" step="0.01">
          <button class="btn-add" onclick="addCategory()">إضافة فئة</button>
        </div>
      </div>
      
      <div>
        <h3 style="font-size: 14px; margin-bottom: 8px;">إضافة كروت</h3>
        <div class="admin-form">
          <select id="categorySelect" style="background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--text); font-family: var(--font);">
            <option value="">اختر الفئة</option>
          </select>
          <textarea id="cardsInput" placeholder="أدخل الكروت (كود واحد في كل سطر)" rows="4"></textarea>
          <button class="btn-add" onclick="addCards()">إضافة الكروت</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Purchase Modal -->
<div id="purchaseModal" class="modal">
  <div class="modal-content">
    <div class="modal-title">✅ تم الشراء بنجاح!</div>
    <div class="modal-text">إليك كود الكرت الخاص بك:</div>
    <div class="code-display" id="purchaseCode">XXXX-XXXX-XXXX</div>
    <button class="btn-copy" onclick="copyCode()">📋 نسخ الكود</button>
    <button class="btn-close" onclick="closePurchaseModal()">إغلاق</button>
  </div>
</div>

<script>
// Data Storage
let currentUser = null;
let users = JSON.parse(localStorage.getItem('users')) || [];
let categories = JSON.parse(localStorage.getItem('categories')) || [
  { id: 1, name: 'باقة 50 جيجا', price: 50, discount: 0 },
  { id: 2, name: 'باقة 100 جيجا', price: 100, discount: 5 },
  { id: 3, name: 'باقة 200 جيجا', price: 200, discount: 10 }
];
let cards = JSON.parse(localStorage.getItem('cards')) || [];
let purchases = JSON.parse(localStorage.getItem('purchases')) || [];

// Save to localStorage
function saveData() {
  localStorage.setItem('users', JSON.stringify(users));
  localStorage.setItem('categories', JSON.stringify(categories));
  localStorage.setItem('cards', JSON.stringify(cards));
  localStorage.setItem('purchases', JSON.stringify(purchases));
}

// Login
function handleLogin() {
  const username = document.getElementById('loginUsername').value;
  const password = document.getElementById('loginPassword').value;
  
  if (!username || !password) {
    alert('الرجاء إدخال اسم المستخدم وكلمة المرور');
    return;
  }
  
  let user = users.find(u => u.username === username && u.password === password);
  
  if (!user) {
    // Create new user if first login
    if (users.length === 0) {
      user = { id: 1, username, password, balance: 1000, isAdmin: true };
    } else {
      user = { id: users.length + 1, username, password, balance: 500, isAdmin: false };
    }
    users.push(user);
    saveData();
  }
  
  currentUser = user;
  showUserPage();
}

// Logout
function handleLogout() {
  currentUser = null;
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
  showAuthPage();
}

// Show Pages
function showAuthPage() {
  document.getElementById('authPage').classList.add('active');
  document.getElementById('userPage').classList.remove('active');
}

function showUserPage() {
  document.getElementById('authPage').classList.remove('active');
  document.getElementById('userPage').classList.add('active');
  updateUI();
}

// Update UI
function updateUI() {
  document.getElementById('balanceAmount').textContent = currentUser.balance.toFixed(2);
  document.getElementById('headerBalance').textContent = currentUser.balance.toFixed(2);
  
  // Show admin section if admin
  document.getElementById('adminSection').style.display = currentUser.isAdmin ? 'block' : 'none';
  
  // Render cards
  renderCards();
  renderPurchases();
  renderCategories();
}

// Render Cards
function renderCards() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  
  categories.forEach(cat => {
    const price = cat.price * (1 - cat.discount / 100);
    const html = `
      <div class="card-item" onclick="buyCard(${cat.id}, ${price})">
        <div class="card-name">${cat.name}</div>
        <div class="card-price">${price.toFixed(2)} ر.س</div>
        ${cat.discount > 0 ? `<div class="card-discount">خصم ${cat.discount}%</div>` : ''}
      </div>
    `;
    grid.innerHTML += html;
  });
}

// Buy Card
function buyCard(categoryId, price) {
  if (currentUser.balance < price) {
    alert('رصيدك غير كافي');
    return;
  }
  
  const availableCards = cards.filter(c => c.categoryId === categoryId && !c.sold);
  if (availableCards.length === 0) {
    alert('لا توجد كروت متاحة في هذه الفئة');
    return;
  }
  
  const card = availableCards[0];
  currentUser.balance -= price;
  card.sold = true;
  
  purchases.push({
    id: purchases.length + 1,
    userId: currentUser.id,
    cardId: card.id,
    code: card.code,
    date: new Date().toLocaleString('ar-SA'),
    price: price
  });
  
  saveData();
  
  // Show modal
  document.getElementById('purchaseCode').textContent = card.code;
  document.getElementById('purchaseModal').classList.add('active');
  
  updateUI();
}

// Copy Code
function copyCode() {
  const code = document.getElementById('purchaseCode').textContent;
  navigator.clipboard.writeText(code);
  alert('تم نسخ الكود!');
}

// Close Modal
function closePurchaseModal() {
  document.getElementById('purchaseModal').classList.remove('active');
}

// Render Purchases
function renderPurchases() {
  const list = document.getElementById('purchasesList');
  const userPurchases = purchases.filter(p => p.userId === currentUser.id);
  
  if (userPurchases.length === 0) {
    list.innerHTML = '<p style="color: var(--text2); text-align: center;">لا توجد مشتريات حتى الآن</p>';
    return;
  }
  
  list.innerHTML = userPurchases.map(p => `
    <div class="purchase-item">
      <div class="purchase-info">
        <div class="purchase-date">${p.date}</div>
        <div class="purchase-code">${p.code}</div>
      </div>
      <button class="btn-copy-small" onclick="copyPurchaseCode('${p.code}')">نسخ</button>
    </div>
  `).join('');
}

// Copy Purchase Code
function copyPurchaseCode(code) {
  navigator.clipboard.writeText(code);
  alert('تم نسخ الكود!');
}

// Add Category (Admin)
function addCategory() {
  const name = document.getElementById('categoryName').value;
  const price = parseFloat(document.getElementById('categoryPrice').value);
  const discount = parseFloat(document.getElementById('categoryDiscount').value) || 0;
  
  if (!name || !price) {
    alert('الرجاء ملء جميع الحقول');
    return;
  }
  
  categories.push({
    id: categories.length + 1,
    name,
    price,
    discount
  });
  
  saveData();
  document.getElementById('categoryName').value = '';
  document.getElementById('categoryPrice').value = '';
  document.getElementById('categoryDiscount').value = '';
  
  updateUI();
  alert('تمت إضافة الفئة بنجاح!');
}

// Add Cards (Admin)
function addCards() {
  const categoryId = parseInt(document.getElementById('categorySelect').value);
  const cardsText = document.getElementById('cardsInput').value;
  
  if (!categoryId || !cardsText) {
    alert('الرجاء اختيار الفئة وإدخال الكروت');
    return;
  }
  
  const cardCodes = cardsText.split('\n').filter(c => c.trim());
  cardCodes.forEach(code => {
    cards.push({
      id: cards.length + 1,
      categoryId,
      code: code.trim(),
      sold: false
    });
  });
  
  saveData();
  document.getElementById('cardsInput').value = '';
  alert(`تمت إضافة ${cardCodes.length} كرت بنجاح!`);
}

// Render Categories (Admin)
function renderCategories() {
  const select = document.getElementById('categorySelect');
  select.innerHTML = '<option value="">اختر الفئة</option>';
  categories.forEach(cat => {
    select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
  });
}

// Initial Load
showAuthPage();
</script>

</body>
</html>
